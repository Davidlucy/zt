<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张婷的简历</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        .card {
            width: min(90vw, 520px);
            padding: 40px 28px;
            border-radius: 16px;
            text-align: center;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 34px;
            color: #222;
        }

        p {
            margin: 0 0 28px;
            color: #666;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 999px;
            background: #1f6feb;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>张婷的简历</h1>
        <p>欢迎查看张婷的个人简历页面，点击下方按钮进入电商运营简历详情。</p>
        <a class="btn" href="./电商运营.html">电商运营</a>
    </main>
</body>
</html>
